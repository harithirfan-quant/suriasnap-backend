services:
  - name: suriasnap-backend
    type: web
    runtime: docker           # use our Dockerfile (needed for tesseract)
    plan: free                # free tier – sleeps after 15 min of inactivity
    region: singapore         # closest region to Malaysia
    healthCheckPath: /health  # Render uses this to wake the service & detect crashes

    # Build & start are handled by the Dockerfile CMD
    # (no startCommand needed when using Docker runtime)

    envVars:
      # Tesseract binary path inside the container
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract

      # Comma-separated list of allowed CORS origins (the browser is blocked
      # unless the site's exact origin is listed here). The live site is
      # suriasnap.vercel.app; suriasnap-frontend.vercel.app is kept as an alias.
      - key: ALLOWED_ORIGINS
        value: https://suriasnap.vercel.app,https://suriasnap-frontend.vercel.app,http://localhost:5173,http://localhost:3000

      # Uvicorn log level (debug | info | warning | error)
      - key: LOG_LEVEL
        value: info

      # ── WhatsApp Cloud API ──────────────────────────────────────────────
      # sync:false = set the value in the Render dashboard, not in this file
      # (keeps secrets out of git). The verify token is one you invent and
      # also paste into Meta's webhook configuration.
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      # App Secret from Meta App Dashboard → Settings → Basic. Used to verify
      # the X-Hub-Signature-256 header on every inbound webhook POST, so we
      # only process messages that genuinely came from Meta. Required in
      # production — without it, anyone who finds the webhook URL can inject
      # fake messages and trigger paid Claude API calls / WhatsApp sends.
      - key: WHATSAPP_APP_SECRET
        sync: false

      # ── Persistence ───────────────────────────────────────────────────────
      # Postgres connection string (e.g. a free Neon or Supabase project).
      # Render's free tier wipes local disk on every deploy/sleep-wake, which
      # silently resets any in-progress WhatsApp conversation if left on
      # SQLite. Set this and the backend automatically switches to Postgres
      # — no other config needed. Leave unset only for quick local testing.
      - key: DATABASE_URL
        sync: false

      # ── Claude Vision (primary bill OCR) ────────────────────────────────
      # If unset, the backend falls back to local Tesseract OCR automatically.
      - key: ANTHROPIC_API_KEY
        sync: false
